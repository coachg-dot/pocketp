workflows:
  ionic-ios-workflow:
    name: Ionic iOS Workflow

    environment:
      node: 20
      xcode: latest

    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - xcodebuild -project ios/App/App.xcodeproj -scheme App -sdk iphonesimulator -configuration Debug build

    artifacts:
      - ios/App/build/**/*.app
