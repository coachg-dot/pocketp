workflows:
  ionic-ios-workflow:
    name: Ionic iOS Workflow

    integrations:
      app_store_connect: PocketPitcher

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guptelpa.pocketpitcher

    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - cd ios/App && pod install
      - cd ../..
      - xcode-project use-profiles
      - xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
