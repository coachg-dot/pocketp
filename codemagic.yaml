workflows:
  ionic-ios-workflow:
    name: Ionic iOS Workflow

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
